<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <link rel="stylesheet" href="assets/themes.css" />
  <link rel="stylesheet" href="assets/components.css" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1280px;height:720px;overflow:hidden;background:transparent}
    #root{position:relative;width:1280px;height:720px;background:var(--bg);color:var(--fg);font-family:var(--font-body),monospace}
    .stage{position:absolute;left:100px;right:100px;top:80px;height:420px;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .content{max-width:900px;text-align:left}
    .content p{font-size:36px;line-height:1.8;margin:8px 0;color:var(--fg)}
    .content strong{color:var(--keyword);font-weight:normal}
    h1,h2{font-family:var(--font-display),monospace;font-size:66px;line-height:1.15;color:var(--keyword);font-weight:normal;margin:0 0 22px}
    h3{font-family:var(--font-display),monospace;font-size:55px;line-height:1.15;color:var(--keyword);font-weight:normal;margin:0 0 18px}
    .content ul{list-style:none;margin:10px 0}
    .content li{font-size:36px;line-height:1.55;margin:10px 0}
    .content li::before{content:'»';font-family:var(--font-display),monospace;color:var(--keyword);margin-right:18px}
    .content code{font-family:var(--font-body),monospace;background:color-mix(in srgb,var(--keyword) 15%,transparent);color:var(--keyword);padding:2px 8px}
    .content pre code{background:transparent;color:inherit;padding:0}
    .content pre{font-family:var(--font-mono),monospace;font-size:25px;line-height:1.45;margin:14px 0;max-width:900px;max-height:260px;overflow:hidden;border:3px solid color-mix(in srgb,var(--keyword) 45%,transparent);box-shadow:0 0 0 3px color-mix(in srgb,var(--bg) 70%,transparent)}
    .content .shiki{padding:18px 22px;background:color-mix(in srgb,var(--fg) 6%,var(--bg)) !important}
    .watermark{position:absolute;right:32px;bottom:24px;font-family:var(--font-display),monospace;font-size:28px;color:var(--muted);opacity:.55}
    .watermark .at{color:var(--keyword)}
  </style>
</head>
<body>
  <div id="root" data-theme="{{theme}}" data-composition-id="markdown" data-start="0" data-duration="{{duration}}" data-width="1280" data-height="720" data-fps="25">
    <div class="stage"><div class="content">{{bodyHtml}}</div></div>
    {{watermarkHtml}}
  </div>
  <script>
    // Static card: no motion, but HyperFrames requires a paused seekable timeline.
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });
    tl.to({}, { duration: {{duration}} }, 0);
    window.__timelines["markdown"] = tl;
  </script>
</body>
</html>
