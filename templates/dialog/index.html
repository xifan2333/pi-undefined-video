<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<!-- SPEAKER_SPRITES filled by generate scene from assets/speaker-sprite.json (or --speaker-sprite). -->
<script type="application/json" id="speaker-sprite">{{speakerSpriteJson}}</script>
<script>
window.SPEAKER_SPRITES = JSON.parse(document.getElementById("speaker-sprite").textContent);
</script>
<link rel="stylesheet" href="assets/themes.css" />
<link rel="stylesheet" href="assets/components.css" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1280px;height:720px;overflow:hidden;background:transparent}
#root{position:relative;width:1280px;height:720px;background:transparent}
#stage{position:absolute;inset:0;width:1280px;height:720px}
</style>
</head>
<body>
<!--
  Dialog chrome states (4 named stills, no baked text):
    idle         — mouth closed, no box, no arrow
    talk-closed  — mouth closed + box (talk A + wait blink off)
    talk-open    — mouth open + box (talk B)
    wait-on      — mouth closed + box + ▼
  data-state selects which still to paint. generate render -f sprite
  exports all four as named PNGs.
-->
<div id="root" data-theme="{{theme}}" data-composition-id="rpg-dialog" data-start="0" data-duration="0.04" data-width="1280" data-height="720" data-fps="{{fps}}" data-state="idle">
  <canvas id="stage" width="1280" height="720"></canvas>
</div>
<script>
const root = document.getElementById('root');
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');

/** Fixed product states — talk-closed doubles as wait blink-off. */
const DIALOG_STATES = ['idle', 'talk-closed', 'talk-open', 'wait-on'];

function cssVar(name){ return getComputedStyle(root).getPropertyValue(name).trim(); }
function rgba(hex, a){
  const h = String(hex || '#000000').replace('#','');
  const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}
function px(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); }
function strokePixelRect(x,y,w,h,s,c){
  px(x+s,y,w-s*2,s,c); px(x+s,y+h-s,w-s*2,s,c);
  px(x,y+s,s,h-s*2,c); px(x+w-s,y+s,s,h-s*2,c);
  px(x+s,y+s,s,s,c); px(x+w-s*2,y+s,s,s,c);
  px(x+s,y+h-s*2,s,s,c); px(x+w-s*2,y+h-s*2,s,s,c);
}
function drawDialogBox(x,y,w,h,bg,fg,kw){
  ctx.save();
  ctx.imageSmoothingEnabled=false;
  px(x+8,y,w-16,h,rgba(bg,0.88));
  px(x,y+8,w,h-16,rgba(bg,0.88));
  strokePixelRect(x,y,w,h,6,kw);
  strokePixelRect(x+10,y+10,w-20,h-20,3,rgba(fg,0.55));
  ctx.restore();
}
function drawRows(rows,x,y,scale,offsetX=0,offsetY=0){
  const pal = window.SPEAKER_SPRITES.palette;
  for(let yy=0; yy<rows.length; yy++){
    const row = rows[yy];
    for(const run of row){
      const [xx,len,ci] = run;
      ctx.fillStyle = pal[ci];
      ctx.fillRect(
        Math.round(x + (offsetX + xx) * scale),
        Math.round(y + (offsetY + yy) * scale),
        Math.ceil(len * scale),
        Math.ceil(scale)
      );
    }
  }
}
function drawSpeaker(x,y,scale,mouthOpen){
  const data = window.SPEAKER_SPRITES;
  ctx.save();
  ctx.imageSmoothingEnabled=false;
  drawRows(data.base, x, y, scale, 0, 0);
  const m = data.mouth;
  drawRows(mouthOpen ? data.mouthOpened : data.mouthClosed, x, y, scale, m.x, m.y);
  ctx.restore();
}
function drawArrow(kw){
  const ax = 1012, ay = 620, u = 5;
  px(ax, ay, u*5, u, kw);
  px(ax+u, ay+u, u*3, u, kw);
  px(ax+u*2, ay+u*2, u, u, kw);
}
function normalizeState(raw){
  const s = String(raw || 'idle').trim();
  return DIALOG_STATES.includes(s) ? s : 'idle';
}
function render(){
  const state = normalizeState(root.dataset.state);
  const bg = cssVar('--bg') || '#272e33';
  const fg = cssVar('--fg') || '#d3c6aa';
  const kw = cssVar('--keyword') || '#83c092';
  ctx.clearRect(0,0,1280,720);
  ctx.imageSmoothingEnabled=false;

  const mouthOpen = state === 'talk-open';
  const showBox = state !== 'idle';
  const showArrow = state === 'wait-on';

  drawSpeaker(58, 514, 1.72, mouthOpen);
  if (showBox) drawDialogBox(285, 552, 780, 95, bg, fg, kw);
  if (showArrow) drawArrow(kw);
}
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({paused:true});
// Single-frame hold; state is selected via data-state, not time.
tl.to({}, {duration:0.04}, 0);
tl.eventCallback('onUpdate', render);
render();
window.__timelines['rpg-dialog'] = tl;
</script>
</body>
</html>
